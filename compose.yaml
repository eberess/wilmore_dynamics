services:
  redis:
    image: redis:7-alpine
    container_name: wilmore-redis
    restart: unless-stopped
    ports:
      - '127.0.0.1:6379:6379'  # Écouter uniquement sur localhost
    volumes:
      - redis-data:/data
    command: |
      redis-server 
      --appendonly yes 
      --requirepass ${REDIS_PASSWORD:-changeme}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  wilmore:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_ENV: production
    
    container_name: nextjs-wilmore
    
    # Dépendre de Redis
    depends_on:
      redis:
        condition: service_healthy
    
    # Ne pas exposer inutilement les ports
    ports:
      - '${NODE_APP_PORT:-3000}:3000'
    
    # Variables d'environnement sécurisées
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme}
    
    # Charger les variables sensibles depuis .env (non committé)
    env_file:
      - .env
    
    # Politique de redémarrage
    restart: on-failure:5
    
    # Limite des ressources
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    
    # Sécurité du conteneur
    security_opt:
      - no-new-privileges:true
    
    # Lecture seule du système de fichiers (sauf les répertoires nécessaires)
    # Note: Désactivé temporairement car Next.js 16 a besoin d'écrire dans .next
    # read_only: true
    
    # Répertoires temporaires pour Next.js
    tmpfs:
      - /tmp
    
    # Healthcheck
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    # Logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service=wilmore"

volumes:
  redis-data:
    driver: local
